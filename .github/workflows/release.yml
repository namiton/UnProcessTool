name: build-msi

on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  build-msi:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install WiX
        # v6 以降は OSMF (Open Source Maintenance Fee) EULA 同意が必要なため v5 系に固定
        run: dotnet tool install --global wix --version 5.0.2

      - name: Determine version
        id: ver
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -match '^refs/tags/v(.+)$') { $Matches[1] } else { '0.0.0' }
          "version=$v" >> $env:GITHUB_OUTPUT

      - name: Build MSI
        shell: pwsh
        run: wix build wix/Package.wxs -d "ProductVersion=${{ steps.ver.outputs.version }}" -o "UnProcessTool-${{ steps.ver.outputs.version }}.msi"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: msi
          path: '*.msi'

      - name: Create release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$env:GITHUB_REF_NAME" (Get-Item *.msi).FullName --title "UnProcessTool $env:GITHUB_REF_NAME" --generate-notes
